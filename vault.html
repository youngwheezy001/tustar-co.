<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Automated SEO & OpenGraph Integration -->
    <meta name="description" content="Tustar Co. Secure Client Vault - Authorized Personnel Only.">
    <meta property="og:title" content="Tustar Co. | The Vault">
    <meta property="og:description" content="Secure file transfer and project staging.">
    <meta property="og:image" content="https://tustarco.sys/assets/og-image.jpg">
    <meta name="twitter:card" content="summary_large_image">
    <title>Tustar Co. | The Vault</title>
    <link rel="stylesheet" href="css/styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <!-- V37 Premium Industrial Drone Preloader -->
    <div id="cinematic-preloader">
        <!-- Telemetry Background Stream -->
        <div class="loader-telemetry" id="loader-telemetry"></div>
        
        <div class="loader-content">
            <div class="logo-wrap">
                <img src="assets/logo.jpg" class="loader-logo" alt="TUSTAR CO.">
                <div class="scan-ring"></div>
            </div>
            
            <div class="drone-orbit-system">
                <div class="drone-path">
                    <div class="industrial-drone">
                        <svg viewBox="0 0 100 100" class="drone-svg">
                            <!-- Industrial Drone Body -->
                            <path d="M30 50 L70 50 L65 60 L35 60 Z" fill="var(--accent-color)" opacity="0.8"/>
                            <rect x="45" y="45" width="10" height="15" fill="#fff" />
                            <!-- Rotors -->
                            <circle cx="30" cy="50" r="12" fill="none" stroke="var(--accent-color)" stroke-width="1" stroke-dasharray="4 2"/>
                            <circle cx="70" cy="50" r="12" fill="none" stroke="var(--accent-color)" stroke-width="1" stroke-dasharray="4 2"/>
                            <!-- Landing Gear -->
                            <path d="M35 60 L30 70 M65 60 L70 70" stroke="var(--accent-color)" stroke-width="2"/>
                            <!-- Lens/Camera -->
                            <circle cx="50" cy="58" r="3" fill="#ff0000" />
                        </svg>
                    </div>
                </div>
            </div>
            
            <div class="loader-status-container">
                <div class="loader-percentage">00%</div>
                <div class="loader-label">INITIALIZING_ASSETS...</div>
            </div>
        </div>
    </div>
    <div id="transition-wipe"></div>
    <div class="global-grain"></div>
    <div class="system-cursor" id="system-cursor"></div>

    <nav id="navbar">
        <a href="index.html" class="nav-brand" style="display:flex; align-items:center; gap:15px;"><img src="assets/logo.jpg" alt="TUSTAR CO." style="height:40px; width:auto; border-radius:3px; box-shadow: 0 0 10px rgba(0,255,49,0.2);"> TUSTAR CO.</a>
        <div class="nav-links">
            <a href="index.html">RETURN TO HOME</a>
        </div>
        <div class="nav-status" style="border-color:var(--accent-color); color:var(--accent-color);">SECURE ACCESS ACTIVE</div>
    </nav>

    <main id="smooth-wrapper" style="min-height:100vh; display:flex; align-items:center; justify-content:center;">
        <div id="smooth-content" style="width:100%;">
            
            <section class="section hq-section" style="padding-top:10vh;">
                <div class="vault-container tilt-card" style="max-width:650px; margin:0 auto; border:1px solid var(--border-color); background:rgba(0,229,255,0.01); padding:60px; border-radius:12px; position:relative; overflow:hidden;">
                    
                    <!-- Professional Authorization Overlay -->
                    <div id="decryption-overlay" style="position:absolute; top:0; left:0; width:100%; height:100%; background:var(--bg-color); z-index:-1; opacity:0; display:flex; flex-direction:column; justify-content:center; align-items:center;">
                        <span id="decrypt-status" style="font-family:var(--font-mono); color:var(--accent-color); font-size:1.2rem; margin-bottom:20px; letter-spacing:3px;">AUTHORIZING_</span>
                        <div class="progress-bar-bg" style="width:70%; height:1px; background:rgba(0,229,255,0.1);"><div id="decrypt-bar" style="width:0%; height:100%; background:var(--accent-color);"></div></div>
                    </div>

                    <div style="text-align:center; margin-bottom:50px;">
                        <p style="font-family:var(--font-mono); color:var(--accent-color); font-size:0.7rem; margin-bottom:15px; letter-spacing:4px;">// ACCESS PORTAL</p>
                        <h2 style="font-size:2.5rem; font-weight:900; letter-spacing:2px;">CLIENT VAULT</h2>
                    </div>

                    <form class="cli-form" id="vault-form" data-netlify="true">
                        <div style="margin-bottom:30px;">
                            <label style="font-family:var(--font-mono); font-size:0.75rem; color:var(--text-secondary); display:block; margin-bottom:12px;">CLIENT EMAIL</label>
                            <input type="text" placeholder="ENTER ID..." style="width:100%; padding:18px; background:rgba(255,255,255,0.02); border:1px solid var(--border-color); color:#fff; border-radius:4px; font-family:var(--font-mono); outline:none;">
                        </div>
                        <div style="margin-bottom:40px;">
                            <label style="font-family:var(--font-mono); font-size:0.75rem; color:var(--text-secondary); display:block; margin-bottom:12px;">ACCESS KEY</label>
                            <input type="password" placeholder="••••••••••••" style="width:100%; padding:18px; background:rgba(255,255,255,0.02); border:1px solid var(--border-color); color:#fff; border-radius:4px; outline:none;">
                        </div>
                        <button type="button" id="vault-login-btn" class="dynamic-magnetic-btn button" style="width:100%; padding:22px; background:var(--accent-color); color:#000; border:none; font-family:var(--font-mono); font-weight:900; letter-spacing:2px;">[ ACCESS PORTAL ]</button>
                    </form>
                    
                    <p style="text-align:center; font-family:var(--font-mono); color:var(--text-secondary); margin-top:40px; font-size:0.65rem; letter-spacing:2px;">WARNING: ALL ATTEMPTS ARE LOGGED VIA CENTRAL INTELLIGENCE.</p>
                </div>
            </section>

        </div>
    </main>

    <!-- 8.0 Nexus Oracle V2.1 (WhatsApp-Style Architecture) -->
    <div id="nexus-oracle-glow"></div>
    <div id="oracle-status-label"></div>
    <div id="social-status-label"></div>
    <div id="nexus-oracle-toggle" title="NEXUS AI STRATEGIST">
        <!-- Floating Brand Icon handled by CSS -->
    </div>

    <!-- Nexus Oracle V30: The 'Tony' Edition -->
    <div id="nexus-oracle-container">
        <div id="oracle-header">
            <div class="oracle-title-group">
                <img src="assets/NEXUS ORACLE.jpg" class="oracle-avatar" alt="Tony">
                <div style="display:flex; flex-direction:column; line-height: 1.2;">
                    <span style="font-weight:700; font-size:1.1rem;">Nexus</span>
                    <span style="font-size:0.75rem; opacity:0.9;">Tustar Lead Strategist • Online</span>
                </div>
            </div>
            <div id="oracle-close"><i class="fas fa-times"></i></div>
        </div>
        <div id="oracle-output">
            <!-- Professional Introduction Message -->
            <div class="oracle-msg AI">
                Hello! I am Nexus, your Tustar Co. strategist. How can I help you today?
            </div>
        </div>
        <form id="oracle-form">
            <div id="oracle-input-area">
                <input type="text" id="oracle-input" placeholder="Type your strategic query..." autocomplete="off">
                <button type="submit" id="oracle-send-btn"><i class="fas fa-paper-plane"></i></button>
            </div>
        </form>
    </div>

    <script src="https://unpkg.com/@studio-freight/lenis@1.0.42/dist/lenis.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script src="js/main.js"></script>
    <script src="js/gemini.js"></script>
    <script>
        document.getElementById('vault-login-btn').addEventListener('click', () => {
            const overlay = document.getElementById('decryption-overlay');
            const bar = document.getElementById('decrypt-bar');
            const status = document.getElementById('decrypt-status');
            status.innerText = "AUTHORIZING_";
            gsap.set(overlay, {opacity: 1, zIndex: 10});
            gsap.fromTo(bar, {width: "0%"}, {
                width: "100%", duration: 1.5, ease: "power4.inOut",
                onComplete: () => {
                    status.innerText = "ACCESS_DENIED. UNKNOWN_IDENTITY.";
                    setTimeout(() => { gsap.to(overlay, {opacity:0, zIndex:-1, duration:0.5}); }, 1500);
                }
            });
        });
    </script>
</body>
</html>
